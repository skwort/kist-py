name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What's broken? How does it manifest?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected code
      description: Modules, files, or areas of the codebase involved.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Workarounds, related issues, open questions.
    validations:
      required: false
