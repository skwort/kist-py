name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --all-extras

      - name: Lint
        run: uvx ruff check src/ tests/

      - name: Type check
        run: uvx ty check

      - name: Test
        run: uv run pytest
